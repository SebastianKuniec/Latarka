name: Release

on:
  push:
    branches: [ "master" ]
    tags:
      - '*'
  pull_request:
    branches: [ "master" ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Set these secrets in GitHub → Settings → Secrets → Actions:
      #   KEYSTORE_BASE64   – base64-encoded .jks file  (openssl base64 -in key.jks)
      #   KEY_ALIAS         – key alias (release)
      #   KEY_PASSWORD      – key password
      #   STORE_PASSWORD    – keystore password
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -f keystore.jks ]; then
            echo "Signing keystore found. Building signed Release APK..."
            ./gradlew :app:assembleRelease \
              -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            echo "Signing keystore not found. Building unsigned Release APK..."
            ./gradlew :app:assembleRelease
          fi

      - name: Rename APK with tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF_NAME}
          mv app/build/outputs/apk/release/app-release*.apk \
             app/build/outputs/apk/release/Latarka-${TAG}.apk || \
          mv app/build/outputs/apk/release/*.apk \
             app/build/outputs/apk/release/Latarka-${TAG}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            app/build/outputs/apk/release/Latarka-*.apk
            app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Latarka ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-files/Latarka-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}